version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: alcp-postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: onboarding_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: alcp-web
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
      PORT: 9000
    depends_on:
      - postgres
    volumes:
      - ./apps/web/src:/app/apps/web/src

  python-sidecar:
    build:
      context: ./apps/python-sidecar/python
    container_name: alcp-python-sidecar
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./apps/python-sidecar/python:/app

  redis:
    image: redis:alpine
    container_name: alcp-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: alcp-redis-commander
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
